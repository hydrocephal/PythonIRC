services:
  postgres:
    image: postgres:15
    container_name: irc-postgres
    environment:
      POSTGRES_USER: irc_user
      POSTGRES_PASSWORD: irc_password
      POSTGRES_DB: irc_chat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: irc-redis
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus
    container_name: irc-prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: irc-grafana
    ports:
      - "3000:3000"
  
volumes:
  postgres_data: